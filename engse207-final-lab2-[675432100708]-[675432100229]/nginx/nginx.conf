# ── Rate limiting zones ──────────────────────────────────────────────
# จำกัดการ Login: 5 ครั้งต่อนาที (ป้องกัน Brute Force)
limit_req_zone $binary_remote_addr zone=login_limit:10m   rate=5r/m;
# จำกัด API ทั่วไป: 30 ครั้งต่อนาที
limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=30r/m;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;
    # บังคับไป HTTPS ทั้งหมด
    return 301 https://$host$request_uri;
}

# ── HTTPS server ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name localhost;

    # TLS certificates (ชี้ไปยังตำแหน่งที่ Mount มาจาก Docker)
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # TLS hardening
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection          "1; mode=block";

    # ── 1. Frontend (Static Files) ───────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── 2. Auth Service (พอร์ต 3001) ──────────────────────────────────
    location /api/auth/ {
        # ✅ ใส่ / ปิดท้ายเพื่อให้ Nginx ตัดคำว่า /api/auth/ ออกก่อนส่งไป Backend
        proxy_pass         http://auth-service:3001/; 
        
        limit_req zone=login_limit burst=5 nodelay;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── 3. Task Service (พอร์ต 3002) ──────────────────────────────────
    location /api/tasks/ {
        # ✅ ใส่ / ปิดท้าย
        proxy_pass         http://task-service:3002/; 
        
        limit_req zone=api_limit burst=20 nodelay;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── 4. User Service (พอร์ต 3003) ──────────────────────────────────
    location /api/users/ {
        # ✅ ใส่ / ปิดท้าย
        proxy_pass         http://user-service:3003/; 
        
        limit_req zone=api_limit burst=20 nodelay;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── 429 Custom Error Response ───────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        return 429 '{"error":"Too Many Requests","retryAfter":60}';
        add_header Content-Type application/json;
    }
}