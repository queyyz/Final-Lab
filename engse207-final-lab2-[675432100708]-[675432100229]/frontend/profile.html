<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>👤 Profile — Final Lab Set 2</title>
  <style>
    /* CSS พื้นฐานแบบเดียวกับหน้าหลัก */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --blue: #3b82f6; --blue2: #2563eb; --radius: 10px; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .profile-box { background: var(--surface); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 500px; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,.5); }
    h2 { margin-bottom: 1.5rem; text-align: center; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; color: var(--muted); font-size: .85rem; margin-bottom: .4rem; }
    .form-group input, .form-group textarea { width: 100%; padding: .75rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .btn-primary { width: 100%; padding: .85rem; background: var(--blue); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; }
    .btn-primary:hover { background: var(--blue2); }
    .btn-back { display: block; text-align: center; margin-top: 1rem; color: var(--muted); text-decoration: none; font-size: .9rem; }
    .btn-back:hover { color: var(--text); }
  </style>
</head>
<body>

<div class="profile-box">
  <h2>👤 แก้ไขโปรไฟล์</h2>
  <div class="form-group">
    <label>ชื่อที่ใช้แสดง (Display Name)</label>
    <input type="text" id="display_name" placeholder="ตั้งชื่อที่อยากให้คนอื่นเห็น">
  </div>
  <div class="form-group">
    <label>คำอธิบายตัวเอง (Bio)</label>
    <textarea id="bio" placeholder="บอกอะไรสักหน่อยเกี่ยวกับตัวคุณ..."></textarea>
  </div>
  <button class="btn-primary" onclick="updateProfile()">💾 บันทึกโปรไฟล์</button>
  <a href="index.html" class="btn-back">← กลับหน้า Task Board</a>
</div>

<script src="config.js"></script>
<script>
const USER = window.APP_CONFIG.USER_URL;
const token = localStorage.getItem('jwt_token');

if (!token) window.location.href = 'index.html'; // ถ้าไม่มี token ดีดกลับไปหน้าแรก

async function loadProfile() {
  try {
    const res  = await fetch(`${USER}/api/users/me`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) throw new Error('Failed to load profile');
    const data = await res.json();
    
    document.getElementById('display_name').value = data.profile.display_name || '';
    document.getElementById('bio').value          = data.profile.bio || '';
  } catch (err) {
    alert('ไม่สามารถโหลดข้อมูลโปรไฟล์ได้');
  }
}

async function updateProfile() {
  const display_name = document.getElementById('display_name').value;
  const bio          = document.getElementById('bio').value;
  
  try {
    const res = await fetch(`${USER}/api/users/me`, {
      method: 'PUT',
      headers: { 
        'Authorization': `Bearer ${token}`, 
        'Content-Type': 'application/json' 
      },
      body: JSON.stringify({ display_name, bio })
    });
    
    if (res.ok) {
      alert('✅ อัปเดต Profile สำเร็จ!');
      window.location.href = 'index.html';
    } else {
      alert('❌ อัปเดตไม่สำเร็จ');
    }
  } catch (err) {
    alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
  }
}

// โหลดข้อมูลทันทีที่เปิดหน้า
loadProfile();
</script>
</body>
</html>
