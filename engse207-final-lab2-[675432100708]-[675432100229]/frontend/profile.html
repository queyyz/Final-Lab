<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 Profile & JWT — Task Board</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            line-height: 1.5;
        }
        .profile-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 2rem;
            max-width: 600px;
            margin: 3rem auto;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }
        .profile-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
        }
        .profile-info h2 {
            font-size: 1.25rem;
        }
        .profile-info p {
            color: #94a3b8;
            font-size: .9rem;
            margin-top: 2px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .info-item label {
            display: block;
            font-size: .75rem;
            color: #94a3b8;
            margin-bottom: .2rem;
            text-transform: uppercase;
            letter-spacing: .06em;
        }
        .info-item p {
            font-size: .95rem;
            font-weight: 500;
        }
        .role-badge {
            font-size: .7rem;
            color: white;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 600;
            display: inline-block;
        }
        .role-admin { background: #a855f7; }
        .role-member { background: #3b82f6; }
        .role-viewer { background: #94a3b8; }
        .jwt-panel {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 1.25rem;
            margin-top: 1.5rem;
        }
        .jwt-panel h3 {
            font-size: .9rem;
            color: #94a3b8;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .jwt-parts {
            display: flex;
            gap: .4rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .jwt-part {
            padding: 4px 8px;
            border-radius: 5px;
            font-family: monospace;
            font-size: .7rem;
            word-break: break-all;
        }
        .jwt-header-part { background: rgba(239,68,68,.2); color: #fca5a5; }
        .jwt-payload-part { background: rgba(168,85,247,.2); color: #c4b5fd; }
        .jwt-sig-part { background: rgba(59,130,246,.2); color: #93c5fd; }
        .jwt-decoded { font-size: .8rem; }
        .jwt-decoded pre {
            background: #1e293b;
            padding: .75rem 1rem;
            border-radius: 8px;
            overflow-x: auto;
            color: #e2e8f0;
            border: 1px solid #334155;
        }
        .token-exp { margin-top: .75rem; font-size: .82rem; }
        .exp-ok { color: #22c55e; }
        .exp-bad { color: #ef4444; }
        .logs-link {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            margin-top: 1rem;
            padding: .5rem 1rem;
            background: rgba(168,85,247,.15);
            color: #c4b5fd;
            border: 1px solid rgba(168,85,247,.3);
            border-radius: 8px;
            font-size: .85rem;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar" id="prof-avatar">?</div>
            <div class="profile-info">
                <h2 id="prof-name">—</h2>
                <p id="prof-email">—</p>
                <span class="role-badge" id="prof-role-badge">—</span>
            </div>
        </div>
        <div class="info-grid">
            <div class="info-item"><label>User ID</label><p id="prof-id">—</p></div>
            <div class="info-item"><label>Role</label><p id="prof-role">—</p></div>
            <div class="info-item"><label>สมัครเมื่อ</label><p id="prof-created">—</p></div>
            <div class="info-item"><label>API Endpoint</label><p style="font-size:.8rem;color:#94a3b8">GET /api/auth/me</p></div>
        </div>
        <div class="jwt-panel">
            <h3>🔍 JWT Token Inspector (เพื่อการเรียนรู้)</h3>
            <div class="jwt-parts" id="jwt-parts"></div>
            <div class="jwt-decoded" id="jwt-decoded"></div>
            <div class="token-exp" id="token-exp"></div>
        </div>
        <a href="logs.html" target="_blank" class="logs-link">📊 ไปดู Log Dashboard →</a>
    </div>
    <script>
        const API = 'https://localhost';
        let token = localStorage.getItem('jwt_token');
        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }
        function escHtml(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        async function loadProfile() {
            const res = await fetch(`${API}/api/auth/me`, { headers: authHeaders() });
            const data = await res.json();
            const u = data.user;
            if (!u) return;
            const initial = (u.name || u.email || '?').charAt(0).toUpperCase();
            document.getElementById('prof-avatar').textContent = initial;
            document.getElementById('prof-name').textContent = u.name || '—';
            document.getElementById('prof-email').textContent = u.email;
            document.getElementById('prof-id').textContent = u.user_id || u.id || '—';
            document.getElementById('prof-role').textContent = u.role;
            document.getElementById('prof-created').textContent =
                u.created_at ? new Date(u.created_at).toLocaleDateString('th-TH') : '—';
            const rb = document.getElementById('prof-role-badge');
            rb.textContent = u.role;
            rb.className = `role-badge role-${u.role}`;
            renderJwtInspector();
        }
        function renderJwtInspector() {
            if (!token) return;
            const parts = token.split('.');
            if (parts.length !== 3) return;
            document.getElementById('jwt-parts').innerHTML = `
                <span class="jwt-part jwt-header-part"  title="Header">${parts[0]}</span>
                <span style="color:#94a3b8">.</span>
                <span class="jwt-part jwt-payload-part" title="Payload">${parts[1]}</span>
                <span style="color:#94a3b8">.</span>
                <span class="jwt-part jwt-sig-part"     title="Signature">${parts[2]}</span>
            `;
            try {
                const payload = JSON.parse(atob(parts[1]));
                const expDate = new Date(payload.exp * 1000);
                const nowMs = Date.now();
                const msLeft = expDate - nowMs;
                const minLeft = Math.round(msLeft / 60000);
                const isExp = msLeft < 0;
                document.getElementById('jwt-decoded').innerHTML = `
                    <p style="font-size:.78rem;color:#94a3b8;margin-bottom:.4rem">🟣 Payload (decoded — ใครก็อ่านได้!):</p>
                    <pre>${JSON.stringify(payload, null, 2)}</pre>
                `;
                document.getElementById('token-exp').innerHTML = isExp
                    ? `<span class="exp-bad">⚠️ Token หมดอายุแล้ว!</span>`
                    : `<span class="exp-ok">✅ Token ยังใช้ได้ — หมดอายุใน ${minLeft} นาที (${expDate.toLocaleTimeString('th-TH')})</span>`;
            } catch (e) {
                document.getElementById('jwt-decoded').innerHTML = '<p style="color:#ef4444">ไม่สามารถ decode ได้</p>';
            }
        }
        window.onload = loadProfile;
    </script>
</body>
</html>
