services:

  # ── 1. Auth Database (ก้อนที่ 1) ──────────────────────────────────
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [taskboard-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d auth_db"]
      interval: 5s
      retries: 5

  # ── 2. Task Database (ก้อนที่ 2) ──────────────────────────────────
  task-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - task_db_data:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [taskboard-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d task_db"]
      interval: 5s
      retries: 5

  # ── 3. User Database (ก้อนที่ 3) ──────────────────────────────────
  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - user_db_data:/var/lib/postgresql/data
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [taskboard-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d user_db"]
      interval: 5s
      retries: 5

  # ── Auth Service (Port 3001) ──
  auth-service:
    build: ./auth-service
    ports:
      - "3001:3001" # 🚨 สำคัญมากสำหรับ Option A
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@auth-db:5432/auth_db
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    depends_on:
      auth-db: { condition: service_healthy }
    networks: [taskboard-net]

  # ── Task Service (Port 3002) ──
  task-service:
    build: ./task-service
    ports:
      - "3002:3002" # 🚨 สำคัญมากสำหรับ Option A
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@task-db:5432/task_db
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3002
    depends_on:
      task-db: { condition: service_healthy }
    networks: [taskboard-net]

  # ── User Service (Port 3003) ──
  user-service:
    build: ./user-service
    ports:
      - "3003:3003" # 🚨 สำคัญมากสำหรับ Option A
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@user-db:5432/user_db
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3003
    depends_on:
      user-db: { condition: service_healthy }
    networks: [taskboard-net]

  # ── Frontend (เสิร์ฟไฟล์หน้าเว็บ) ──
  frontend:
    build: ./frontend
    ports:
      - "8080:80" # 🌐 เปิดเข้าเว็บผ่าน http://localhost:8080
    networks: [taskboard-net]

volumes:
  auth_db_data:
  task_db_data:
  user_db_data:

networks:
  taskboard-net:
    driver: bridge