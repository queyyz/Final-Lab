services:

  # ── 1. Auth Database ──────────────────────────────────────────────
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [taskboard-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d auth_db"]
      interval: 5s
      retries: 5

  # ── 2. Task Database ──────────────────────────────────────────────
  task-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - task_db_data:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [taskboard-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d task_db"]
      interval: 5s
      retries: 5

  # ── 3. User Database ──────────────────────────────────────────────
  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - user_db_data:/var/lib/postgresql/data
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [taskboard-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d user_db"]
      interval: 5s
      retries: 5

  # ── Auth Service (Port 3001) ──
  auth-service:
    build: ./auth-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@auth-db:5432/auth_db
      DB_HOST: auth-db
      DB_PORT: 5432                  # 👈 เพิ่มบรรทัดนี้
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: auth_db
      POSTGRES_USER: ${POSTGRES_USER} # 👈 เพิ่มกันเหนียว
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # 👈 เพิ่มกันเหนียว
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    depends_on:
      auth-db: { condition: service_healthy }
    networks: [taskboard-net]

  # ── Task Service (Port 3002) ──
  task-service:
    build: ./task-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@task-db:5432/task_db
      DB_HOST: task-db
      DB_PORT: 5432                  # 👈 เพิ่มบรรทัดนี้
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: task_db
      POSTGRES_USER: ${POSTGRES_USER} # 👈 เพิ่มกันเหนียว
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # 👈 เพิ่มกันเหนียว
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3002
    depends_on:
      task-db: { condition: service_healthy }
    networks: [taskboard-net]

  # ── User Service (Port 3003) ──
  user-service:
    build: ./user-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@user-db:5432/user_db
      DB_HOST: user-db
      DB_PORT: 5432                  # 👈 เพิ่มบรรทัดนี้
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: user_db
      POSTGRES_USER: ${POSTGRES_USER} # 👈 เพิ่มกันเหนียว
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # 👈 เพิ่มกันเหนียว
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3003
    depends_on:
      user-db: { condition: service_healthy }
    networks: [taskboard-net]

  # ── Frontend ──
  frontend:
    build: ./frontend
    networks: [taskboard-net]

  # ── Nginx Gateway ──
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
      - task-service
      - user-service
      - frontend
    networks: [taskboard-net]

volumes:
  auth_db_data:
  task_db_data:
  user_db_data:

networks:
  taskboard-net:
    driver: bridge